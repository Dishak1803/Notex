<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>MCQ Bridge Run</title>
<link rel="stylesheet" href="game.css">
</head>
<body>

<div id="setup">
  <h1>⬡ MCQ BRIDGE RUN</h1>
  <div class="sub">UPLOAD NOTES · AI QUESTIONS · RUN THE BRIDGE</div>
  <input type="file" id="fi" accept=".pdf,.jpg,.jpeg,.png,.webp,.doc,.docx,.ppt,.pptx,.txt,.md">
  <div class="ubox" onclick="document.getElementById('fi').click()">
    <div class="ico" id="uico">📂</div>
    <div class="lbl" id="ulbl">Click to upload your notes</div>
    <div class="hint">JPG · PNG · PDF · DOCX · PPT · TXT</div>
  </div>
  <input type="text" id="subjectinput" placeholder="Subject (e.g. Data Structures, Biology)">
  <button id="runbtn" onclick="doStart()">▶ &nbsp;GENERATE &amp; RUN</button>
  <div class="prog" id="prog">
    <div class="prog-t"><div class="prog-f" id="pf"></div></div>
    <div class="prog-l" id="pl"></div>
  </div>
</div>

<canvas id="gc"></canvas>

<div id="hud">
  <div id="qbox">
    <div id="qlbl">QUESTION <span id="qn">1</span> / <span id="qt">?</span></div>
    <div id="qtxt"></div>
    <div id="qopts"></div>
  </div>
  <div id="sbox"><div id="sval">0</div><div id="slbl">SCORE</div></div>
  <div id="lbox">Q <span id="qncur">1</span><span style="color:rgba(255,255,255,0.35)"> / </span><span id="qntot" style="color:rgba(255,255,255,0.55)">?</span></div>
  <div id="hint">← A &nbsp;|&nbsp; D → &nbsp; SWITCH LANE</div>
  <div id="countdown" style="display:none;flex-direction:column;align-items:center;position:absolute;bottom:48px;left:50%;transform:translateX(-50%)">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="17" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3.5"/>
      <circle id="cd-ring" cx="22" cy="22" r="17" fill="none" stroke="#60a5fa" stroke-width="3.5"
        stroke-dasharray="106.81" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90 22 22)" style="transition:stroke-dashoffset .15s linear"/>
      <text id="cd-num" x="22" y="27" text-anchor="middle" fill="rgba(255,255,255,0.8)"
        font-size="13" font-family="monospace" font-weight="900">3</text>
    </svg>
    <div style="color:rgba(255,255,255,0.35);font-size:.58rem;letter-spacing:2px;margin-top:5px">PANELS INCOMING</div>
  </div>
</div>

<div id="results">
  <div id="results-header">
    <div>
      <h2>📋 RESULTS</h2>
      <div class="rstat" id="rstat"></div>
    </div>
    <button class="gbtn gbtn-e" style="pointer-events:auto" onclick="closeResults()">✕ CLOSE</button>
  </div>
  <div id="results-body"></div>
  <div id="results-footer">
    <button class="gbtn gbtn-p" style="pointer-events:auto" onclick="closeResults();replay()">↺ PLAY AGAIN</button>
    <button class="gbtn gbtn-e" style="pointer-events:auto" onclick="closeResults();goSetup()">✕ EXIT</button>
  </div>
</div>

<div id="gover">
  <h2 id="go-title">RUN COMPLETE!</h2>
  <div class="gs" id="gs">0 pts</div>
  <div class="gm" id="gm"></div>
  <div>
    <button class="gbtn gbtn-p" onclick="replay()">↺ PLAY AGAIN</button>
    <button class="gbtn" style="background:rgba(96,165,250,0.15);border:1px solid rgba(96,165,250,0.4)!important;color:#93c5fd" onclick="showResults()">📋 VIEW RESULTS</button>
    <button class="gbtn gbtn-e" onclick="goSetup()">✕ EXIT</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════
// FILE UPLOAD
// ═══════════════════════════════════════════════════
let chosenFile=null,filePageCount=1,fileSizeKB=0;
document.getElementById('fi').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  filePageCount=1;fileSizeKB=Math.round(file.size/1024);
  const ext=file.name.split('.').pop().toLowerCase();
  const su=(i,l)=>{document.getElementById('uico').textContent=i;document.getElementById('ulbl').textContent=l;};
  if(ext==='pdf'){
    su('⏳','Converting PDF…');
    try{
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
      filePageCount=pdf.numPages;
      const blobs=[];
      for(let i=1;i<=Math.min(pdf.numPages,4);i++){
        const pg=await pdf.getPage(i),vp=pg.getViewport({scale:1.5});
        const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
        await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
        blobs.push(await new Promise(r=>cv.toBlob(r,'image/jpeg',0.85)));
      }
      let blob=blobs[0];
      if(blobs.length>1){
        const imgs=await Promise.all(blobs.map(b=>new Promise((r,rj)=>{const im=new Image();im.onload=()=>r(im);im.onerror=rj;im.src=URL.createObjectURL(b);})));
        const mw=Math.max(...imgs.map(i=>i.width)),th=imgs.reduce((s,i)=>s+i.height,0);
        const sc=document.createElement('canvas');sc.width=mw;sc.height=th;
        const sctx=sc.getContext('2d');let y=0;imgs.forEach(im=>{sctx.drawImage(im,0,y);y+=im.height;});
        blob=await new Promise(r=>sc.toBlob(r,'image/jpeg',0.85));
      }
      chosenFile=await shrink(blob,file.name.replace(/\.pdf$/i,'.jpg'));
      su('✅',`PDF ready — ${filePageCount} pages, ${Math.round(chosenFile.size/1024)}KB`);
    }catch(e){console.error(e);su('❌','PDF failed — try an image');}
    return;
  }
  if(['jpg','jpeg','png','webp'].includes(ext)){
    su('⏳','Optimising…');chosenFile=await shrink(file,file.name);
    fileSizeKB=Math.round(chosenFile.size/1024);su('✅',`${file.name} — ${fileSizeKB}KB`);return;
  }
  chosenFile=file;su('✅',file.name);
});

async function shrink(blob,name){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>900){h=Math.round(h*900/w);w=900;}
      if(h>1400){w=Math.round(w*1400/h);h=1400;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      const cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,w,h);cx.drawImage(img,0,0,w,h);
      cv.toBlob(b=>res(new File([b],name.replace(/\.[^.]+$/,'.jpg'),{type:'image/jpeg'})),'image/jpeg',0.82);
    };
    img.onerror=()=>res(new File([blob],name));
    img.src=URL.createObjectURL(blob);
  });
}

// ═══════════════════════════════════════════════════
// GENERATE + START
// ═══════════════════════════════════════════════════
let QS=[];
async function doStart(){
  const file=chosenFile||document.getElementById('fi').files[0];
  const sub=document.getElementById('subjectinput').value.trim();
  if(!file){alert('Upload your notes first!');return;}
  if(!sub){alert('Enter a subject name!');return;}
  const rawCount=filePageCount>1?filePageCount*3:Math.max(5,Math.round(fileSizeKB/30));
  const qCount=Math.min(30,Math.max(3,rawCount));
  const btn=document.getElementById('runbtn'),prog=document.getElementById('prog'),
        pf=document.getElementById('pf'),pl=document.getElementById('pl');
  btn.disabled=true;prog.style.display='block';
  pl.textContent=`Generating ~${qCount} questions…`;
  const steps=[{p:15,t:'📄 Reading notes…'},{p:35,t:'🔍 Extracting…'},{p:55,t:`🤖 Generating ${qCount} questions…`},{p:75,t:'🧠 Building quiz…'},{p:90,t:'🎮 Almost ready…'}];
  let si=0;pl.textContent=steps[0].t;
  const iv=setInterval(()=>{if(si<steps.length){pf.style.width=steps[si].p+'%';pl.textContent=steps[si].t;si++;}else pl.textContent='⏳ Working…';},4000);
  try{
    const fd=new FormData();fd.append('file',file);fd.append('subject',sub);fd.append('count',qCount);
    const r=await fetch('/generate-mcq',{method:'POST',body:fd});
    const d=await r.json();clearInterval(iv);
    if(!r.ok||!d.success){
      pl.textContent='❌ '+(d.error||'Failed');pl.style.color='#f87171';
      setTimeout(()=>{prog.style.display='none';pf.style.width='5%';pl.style.color='';btn.disabled=false;},5000);return;
    }
    QS=d.questions.slice(0,qCount);
    pf.style.width='100%';pl.textContent=`✅ ${QS.length} questions ready!`;
    setTimeout(()=>{prog.style.display='none';btn.disabled=false;document.getElementById('setup').style.display='none';startGame();},700);
  }catch(e){
    clearInterval(iv);console.error(e);
    pl.textContent='❌ Network error';pl.style.color='#f87171';
    setTimeout(()=>{prog.style.display='none';pf.style.width='5%';pl.style.color='';btn.disabled=false;},4000);
  }
}

// ═══════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════
const cv=document.getElementById('gc');
const cx=cv.getContext('2d');
let W,H,RAF=null,lastT=0;
let qIdx,score,gameOn;
let runZ,spd,lane,charX,charXTarget,legT,bobY;
let tileOff=0;
let resultLog=[];
const READ_DURATION=3;
let panels=[],panelActive=false,panelAnswered=false;
let readDelay=false,readTimer=0;
let fbTimer=0,fbMsg='',fbColor='';
let boats=[],fish=[],ripples=[],birds=[],clouds=[];

function initBoats(){
  boats=[];
  const sides=['L','R','L','R','L'];
  for(let i=0;i<5;i++)
    boats.push({side:sides[i],z:0.08+i*0.18,x:(sides[i]==='L'?-1:1)*(0.65+Math.random()*0.25),
      spd:0.004+Math.random()*0.006,wobble:Math.random()*Math.PI*2,wobbleSpd:0.8+Math.random()*0.8,
      color:['#e8d5a3','#d4a96a','#c8b89a','#e0c888','#b8a070'][i],
      sailColor:['#fff','#e74c3c','#3498db','#fff','#e8d020'][i],
      type:i%2,wakePhase:Math.random()*Math.PI*2});
}
function maybeSpawnFish(dt){
  if(Math.random()<dt*0.4&&fish.length<4){
    const side=Math.random()<0.5?-1:1;
    fish.push({x:W*(0.5+side*(0.18+Math.random()*0.15)),t:0,dur:0.9+Math.random()*0.4,
      size:4+Math.random()*5,color:['#48cae4','#90e0ef','#00b4d8','#ade8f4'][Math.floor(Math.random()*4)],
      angle:side*(0.4+Math.random()*0.3),setY:false,y:0});
  }
  fish=fish.filter(f=>f.t<f.dur);fish.forEach(f=>f.t+=dt);
}
function maybeSpawnRipple(dt){
  if(Math.random()<dt*1.2&&ripples.length<8)
    ripples.push({x:Math.random()*W,y:0,r:0,maxR:18+Math.random()*22,t:0,dur:1.4+Math.random()*0.6,setY:false});
  ripples=ripples.filter(r=>r.t<r.dur);ripples.forEach(r=>r.t+=dt);
}
function initBirds(){
  birds=[];
  for(let i=0;i<6;i++)
    birds.push({x:Math.random()*W,y:H*(0.06+Math.random()*0.18),
      spd:18+Math.random()*25,wingT:Math.random()*Math.PI*2,
      wingSpd:3+Math.random()*2,size:4+Math.random()*4,dir:Math.random()<0.5?1:-1});
}
function initClouds(){
  clouds=[];
  for(let i=0;i<7;i++)
    clouds.push({x:Math.random()*W,y:H*(0.04+Math.random()*0.22),
      w:60+Math.random()*80,h:18+Math.random()*20,spd:8+Math.random()*12,alpha:0.55+Math.random()*0.3});
}

function startGame(){
  qIdx=0;score=0;gameOn=true;
  runZ=0;spd=520;lane=1;legT=0;bobY=0;fbTimer=0;
  panels=[];panelActive=false;panelAnswered=false;readDelay=false;tileOff=0;resultLog=[];
  resize();charX=charXTarget=W*0.5;
  initBoats();initBirds();initClouds();fish=[];ripples=[];
  document.getElementById('hud').style.display='block';
  document.getElementById('gover').style.display='none';
  document.getElementById('countdown').style.display='none';
  document.getElementById('qopts').innerHTML='';
  updateHUD();loadQ();
  window.addEventListener('keydown',onKey);
  window.addEventListener('touchstart',onTS,{passive:true});
  window.addEventListener('touchend',onTE,{passive:true});
  window.addEventListener('resize',resize);
  if(RAF)cancelAnimationFrame(RAF);
  lastT=performance.now();RAF=requestAnimationFrame(loop);
}
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
function loop(now){
  RAF=requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,0.05);lastT=now;
  if(!gameOn)return;update(dt);draw();
}

function update(dt){
  if(readDelay){
    readTimer-=dt;tickCountdown(readTimer);
    if(readTimer<=0){readDelay=false;document.getElementById('countdown').style.display='none';spawnPanels();}
  }
  runZ+=spd*dt;spd=Math.min(spd+8*dt,900);tileOff=runZ%120;
  charXTarget=W*[0.26,0.5,0.74][lane];
  charX+=(charXTarget-charX)*Math.min(12*dt,1);
  legT+=dt*(spd/520)*6;bobY=Math.abs(Math.sin(legT))*5;
  boats.forEach(b=>{b.z+=b.spd*2.5;b.wobble+=b.wobbleSpd*dt;b.wakePhase+=dt*3;if(b.z>0.95){b.z=0.06;b.x=(b.side==='L'?-1:1)*(0.65+Math.random()*0.25);}});
  birds.forEach(b=>{b.x+=b.spd*b.dir*dt*2.2;b.wingT+=b.wingSpd*dt*1.8;if(b.x>W+40)b.x=-40;if(b.x<-40)b.x=W+40;});
  clouds.forEach(c=>{c.x-=c.spd*dt*2.5;if(c.x<-c.w-40)c.x=W+40;});
  maybeSpawnFish(dt);maybeSpawnRipple(dt);

  if(panelActive&&!panelAnswered){
    panels.forEach(p=>{
      if(!p.hit&&p.sz>0.92){
        const px=W*[0.26,0.5,0.74][p.laneIdx];
        if(Math.abs(charX-px)<W*0.12){
          panelAnswered=true;p.hit=true;
          const _q=QS[qIdx];
          const _allOpts=[_q.option_a,_q.option_b,_q.option_c].filter(Boolean);
          resultLog.push({q:_q.question,allOpts:_allOpts,correctIdx:_q.correct_option,chosenLabel:p.label,correct:p.correct,skipped:false});
          if(p.correct){score+=10;fbMsg='✓ CORRECT! +10';fbColor='#22c55e';fbTimer=0.9;}
          else{spd=Math.max(400,spd-60);fbMsg='✗ WRONG!';fbColor='#ef4444';fbTimer=0.9;}
          p.flashColor=p.correct?'#22c55e':'#ef4444';
          flashHudPill(p.laneIdx,p.correct?'#22c55e':'#ef4444');
          updateHUD();
          setTimeout(()=>{
            qIdx++;if(qIdx>=QS.length){endGame();return;}
            document.getElementById('qopts').innerHTML='';
            panels=[];panelActive=false;loadQ();
          },900);
        }
      }
    });
  }
  if(panelActive)panels.forEach(p=>{p.sz+=dt*(spd/520)*0.038;p.sz=Math.min(p.sz,1.05);});
  if(panelActive&&!panelAnswered&&panels.length>0&&panels[0].sz>=1.05&&!panels[0].hit){
    panelAnswered=true;
    const _q=QS[qIdx];
    const _allOpts=[_q.option_a,_q.option_b,_q.option_c].filter(Boolean);
    resultLog.push({q:_q.question,allOpts:_allOpts,correctIdx:_q.correct_option,chosenLabel:null,correct:false,skipped:true});
    fbMsg='⚠ MISSED!';fbColor='#f59e0b';fbTimer=0.8;
    updateHUD();
    setTimeout(()=>{
      qIdx++;if(qIdx>=QS.length){endGame();return;}
      document.getElementById('qopts').innerHTML='';
      panels=[];panelActive=false;loadQ();
    },800);
  }
  if(fbTimer>0)fbTimer-=dt;
}

function tickCountdown(remaining){
  const circ=2*Math.PI*17;
  const frac=Math.max(0,Math.min(1,remaining/READ_DURATION));
  const ring=document.getElementById('cd-ring'),num=document.getElementById('cd-num');
  if(ring)ring.style.strokeDashoffset=(circ*(1-frac)).toFixed(2);
  if(num)num.textContent=Math.ceil(Math.max(0,remaining));
}
function flashHudPill(laneIdx,color){
  const pills=document.querySelectorAll('.qopt');
  if(pills[laneIdx]){pills[laneIdx].style.borderColor=color;pills[laneIdx].style.background=color+'33';}
}

// ── DRAW ───────────────────────────────────────────
const VPY=0.36;
function vpY(){return H*VPY;}
function pX(wx,z){return W/2+wx*(W*0.5)*Math.pow(z,0.68);}
function pY(z){return vpY()+(H*0.64)*Math.pow(z,0.63);}
function pS(z){return 0.05+z*0.95;}

function draw(){
  cx.clearRect(0,0,W,H);
  drawSky();drawClouds();drawWater();drawRipples();
  drawBoats();drawFish();drawBirds();
  drawBridge();
  if(panelActive)drawPanels();
  drawCharacter();
  if(fbTimer>0)drawFeedback();
}

function drawSky(){
  const g=cx.createLinearGradient(0,0,0,vpY()*1.7);
  g.addColorStop(0,'#0a1f3d');g.addColorStop(0.35,'#1a4a8a');g.addColorStop(0.7,'#2e7fc8');g.addColorStop(1,'#5aaedf');
  cx.fillStyle=g;cx.fillRect(0,0,W,vpY()*1.7);
  const sx=W*0.78,sy=H*0.07;
  const sg=cx.createRadialGradient(sx,sy,2,sx,sy,70);
  sg.addColorStop(0,'rgba(255,252,200,1)');sg.addColorStop(0.25,'rgba(255,220,80,0.6)');sg.addColorStop(0.6,'rgba(255,180,40,0.2)');sg.addColorStop(1,'rgba(255,160,0,0)');
  cx.fillStyle=sg;cx.fillRect(sx-80,sy-80,160,160);
  cx.fillStyle='rgba(255,252,200,0.95)';cx.beginPath();cx.arc(sx,sy,11,0,Math.PI*2);cx.fill();
  cx.save();cx.globalAlpha=0.07;cx.strokeStyle='#ffe080';cx.lineWidth=18;
  for(let i=0;i<8;i++){const a=i/8*Math.PI*2;cx.beginPath();cx.moveTo(sx+Math.cos(a)*14,sy+Math.sin(a)*14);cx.lineTo(sx+Math.cos(a)*80,sy+Math.sin(a)*80);cx.stroke();}
  cx.restore();
  const hg=cx.createLinearGradient(0,H*0.28,0,vpY()*1.4);
  hg.addColorStop(0,'rgba(120,200,255,0)');hg.addColorStop(1,'rgba(180,230,255,0.12)');
  cx.fillStyle=hg;cx.fillRect(0,H*0.28,W,H*0.3);
}
function drawClouds(){
  clouds.forEach(c=>{
    cx.globalAlpha=c.alpha;cx.fillStyle='#fff';
    cx.beginPath();cx.arc(c.x,c.y,c.h*0.7,0,Math.PI*2);cx.arc(c.x+c.w*0.28,c.y-c.h*0.2,c.h*0.55,0,Math.PI*2);
    cx.arc(c.x+c.w*0.55,c.y,c.h*0.5,0,Math.PI*2);cx.arc(c.x+c.w*0.25,c.y+c.h*0.2,c.h*0.4,0,Math.PI*2);cx.fill();
  });cx.globalAlpha=1;
}
function drawWater(){
  const vy=vpY(),t=Date.now()*0.001;
  const blH=pX(-0.52,0.01),brH=pX(0.52,0.01),blB=pX(-0.52,1),brB=pX(0.52,1),db=pY(1)+10;
  const wgL=cx.createLinearGradient(0,vy,0,H);
  wgL.addColorStop(0,'#1a7fc0');wgL.addColorStop(0.3,'#1260a8');wgL.addColorStop(1,'#0a3a70');
  cx.beginPath();cx.moveTo(0,vy);cx.lineTo(blH,vy);cx.lineTo(blB,db);cx.lineTo(0,H+10);cx.closePath();cx.fillStyle=wgL;cx.fill();
  cx.beginPath();cx.moveTo(W,vy);cx.lineTo(brH,vy);cx.lineTo(brB,db);cx.lineTo(W,H+10);cx.closePath();cx.fillStyle=wgL;cx.fill();
  cx.save();cx.globalAlpha=0.18;
  for(let i=0;i<10;i++){
    const wy=vy+(H-vy)*((i+1)/12),wv=Math.sin(t*1.2+i*0.9)*14,wv2=Math.cos(t*0.7+i*1.3)*8;
    cx.strokeStyle=`rgba(120,210,255,${0.4-i*0.03})`;cx.lineWidth=1.5;cx.beginPath();cx.moveTo(0,wy+wv);
    for(let x=0;x<W;x+=40)cx.lineTo(x,wy+Math.sin(t+x*0.02)*wv+wv2);
    cx.lineTo(W,wy-wv);cx.stroke();
  }
  cx.globalAlpha=0.06;cx.fillStyle='#a0e8ff';
  for(let i=0;i<5;i++){const lx=(i*W*0.22+Math.sin(t*0.5+i)*30)%W,ly=vy+(H-vy)*(0.1+i*0.17);cx.beginPath();cx.ellipse(lx,ly,30+Math.sin(t+i)*8,8,Math.sin(t*0.3+i)*0.3,0,Math.PI*2);cx.fill();}
  cx.restore();
}
function drawRipples(){
  const vy=vpY();
  ripples.forEach(r=>{
    const p=r.t/r.dur;r.r=r.maxR*p;
    if(!r.setY){r.y=vy+(H-vy)*(0.05+Math.random()*0.8);r.setY=true;}
    const bx1=pX(-0.52,0.5),bx2=pX(0.52,0.5);if(r.x>bx1&&r.x<bx2)return;
    cx.globalAlpha=(1-p)*0.5;cx.strokeStyle='rgba(150,220,255,0.8)';cx.lineWidth=1.2;
    cx.beginPath();cx.ellipse(r.x,r.y,r.r,r.r*0.35,0,0,Math.PI*2);cx.stroke();cx.globalAlpha=1;
  });
}
function drawBoat(b){

function wrapTxt(text,cx_,cy_,mw,lh){
  const words=text.split(' ');let line='',lines=[];

  if(line)lines.push(line);
  const sy=cy_-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>cx.fillText(l,cx_,sy+i*lh));
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

  allOpts.forEach((opt,i)=>{
    const pill=document.createElement('div');pill.className='qopt';
    pill.style.cssText='background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.18)';
    pill.innerHTML=`<span class="qopt-letter" style="background:rgba(255,255,255,0.15)">${['A','B','C'][i]}</span><span>${opt}</span>`;
    container.appendChild(pill);
  });
}

function showResults(){
  const correct=resultLog.filter(r=>r.correct).length;
  const total=resultLog.length;
  document.getElementById('rstat').textContent=`${correct} correct · ${total-correct} wrong/missed · ${total} answered`;
  const body=document.getElementById('results-body');body.innerHTML='';
  resultLog.forEach((r,i)=>{
    const allOpts=r.allOpts;
    const cls=r.skipped?'skipped':r.correct?'correct':'wrong';
    const icon=r.skipped?'⚠️':r.correct?'✅':'❌';
    const card=document.createElement('div');card.className=`rcard ${cls}`;
    let optsHtml='';
    allOpts.forEach((opt,oi)=>{
      const isCorrect=oi===r.correctIdx,isChosen=opt===r.chosenLabel;
      let cls2='ropt';
      if(isCorrect)cls2+=' is-correct';else if(isChosen&&!r.correct)cls2+=' is-chosen wrong';
      const prefix=isCorrect?'✓ ':isChosen&&!r.correct?'✗ ':'  ';
      optsHtml+=`<div class="${cls2}">${prefix}${['A','B','C'][oi]}. ${opt}</div>`;
    });
    card.innerHTML=`<div class="rcard-icon">${icon}</div><div class="rcard-body"><div class="rcard-num">Q${i+1} ${r.skipped?'· MISSED':r.correct?'· CORRECT':'· WRONG'}</div><div class="rcard-q">${r.q}</div><div class="rcard-opts">${optsHtml}</div></div>`;
    body.appendChild(card);
  });
  if(resultLog.length===0)body.innerHTML='<div style="color:rgba(255,255,255,0.3);text-align:center;padding:40px;font-size:.9rem">No questions answered yet.</div>';
  document.getElementById('results').style.display='flex';
}
function closeResults(){document.getElementById('results').style.display='none';}

// ═══════════════════════════════════════════════════
// END GAME — fun punchlines, zero shade
// ═══════════════════════════════════════════════════
function endGame(){
  gameOn=false;if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  document.getElementById('hud').style.display='none';
  document.getElementById('countdown').style.display='none';
  const correct=resultLog.filter(r=>r.correct).length;
  const answered=resultLog.length;
  const pct=answered>0?Math.round(correct/answered*100):0;
  document.getElementById('gs').textContent=correct+' / '+answered+'  ·  '+pct+'%';

  const lines={
    100:['Every single one. The bridge never stood a chance.','Expected. The nerd has logged their daily W.','Perfect score? Did you memorize the PDF in your sleep too?','100%? Honestly disgusting. Go touch grass.','Congratulations on having no life. It paid off!','Are you even human or just a very well-trained language model?'],
    80: ['Your notes are doing most of the work and it shows.','Pretty good... for someone who definitely Googled half of it.','80s club. Not bad, not impressive. Comfortably mediocre.','So close to perfect yet somehow still not. Classic you.','Strong effort. Your notes are doing a lot of heavy lifting.','High scorer energy. Bet you highlighted every single sentence too.'],
    60: ['More right than wrong, which is technically a win.','Your notes are crying right now.','Barely above average. Your professor would not be thrilled.','You read the notes... with your eyes closed, apparently.','Some of those answers were choices. Bold, wrong choices.','60% means you got 40% wrong. Just saying.'],
    40: ['The panels came in fast and your feet made some creative decisions.','The panels came for you and you were NOT ready.','Did you upload the right notes or just vibes?','Even a coin flip would have done better. Statistically.','This is the intellectual equivalent of showing up to an exam in slippers.','Your brain said "not today" and honestly... fair.'],
    20: ['The correct panels showed up every time. You two just kept missing each other.','This is not a score. This is a cry for help.','Were you even trying or was this a performance art piece?','The signs were LITERALLY right in front of you. Multiple times.','Buddy, even autocorrect would have done better.','Study harder, dumbo. Like, significantly harder.'],
    0:  ['You found every wrong lane with remarkable accuracy.','ZERO. A legendary achievement in the wrong direction.','Not a single one. That takes actual skill to fail this hard.','You managed to dodge every correct answer like a pro. Respect.','Random guessing gets ~33%. You are below random. That\'s art.','You didn\'t just fail, you speedran failing. GG no re.']
  };

  const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  let msg,title;
  if(pct===100){msg=pick(lines[100]);title='PERFECT RUN.';}
  else if(pct>=80){msg=pick(lines[80]);title='GREAT RUN.';}
  else if(pct>=60){msg=pick(lines[60]);title='DECENT RUN.';}
  else if(pct>=40){msg=pick(lines[40]);title='ROUGH RUN.';}
  else if(pct>=20){msg=pick(lines[20]);title='INTERESTING RUN.';}
  else{msg=pick(lines[0]);title='A RUN HAPPENED.';}

  document.getElementById('go-title').textContent=title;
  document.getElementById('gm').textContent=msg;
  document.getElementById('gover').style.display='flex';
}

function replay(){document.getElementById('gover').style.display='none';document.getElementById('results').style.display='none';startGame();}
function goSetup(){
  gameOn=false;if(RAF){cancelAnimationFrame(RAF);RAF=null;}
  document.getElementById('gover').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('setup').style.display='flex';
}
</script>
